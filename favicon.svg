<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="12" cy="12" r="7.5"/>
    </clipPath>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="6" fill="#0d0d1a"/>

  <!-- Avatar photo (left side) -->
  <image href="icon-red.jpg" x="3.5" y="3.5" width="17" height="17" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Avatar ring -->
  <circle cx="12" cy="12" r="7.5" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.6"/>

  <!-- Data bars (right side) -->
  <rect x="21" y="19" width="3.5" height="8" rx="1" fill="url(#g)" opacity="0.5"/>
  <rect x="25.5" y="14" width="3.5" height="13" rx="1" fill="url(#g)" opacity="0.75"/>
  <rect x="30" y="8" width="3.5" height="19" rx="1" fill="url(#g)"/>

  <!-- Trend line on bars -->
  <path d="M23 18 L27 13 L31 8" fill="none" stroke="#f5a623" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <circle cx="31" cy="8" r="1.2" fill="#f5a623"/>
</svg>
