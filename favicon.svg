<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="40%" stop-color="#ef5777"/>
      <stop offset="70%" stop-color="#f06a80"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="lgV" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="50%" stop-color="#e8a230"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="196" height="196" rx="46" fill="none" stroke="url(#lg)" stroke-width="1" opacity="0.15"/>
  <rect x="8" y="8" width="184" height="184" rx="40" fill="none" stroke="rgba(233,69,96,0.08)" stroke-width="0.8"/>
  <rect x="14" y="14" width="172" height="172" rx="34" fill="rgba(233,69,96,0.03)"/>
  <!-- Diamond -->
  <g transform="translate(100,80)">
    <polygon points="0,-48 48,0 0,48 -48,0" fill="url(#diamond)" opacity="0.9" filter="url(#glow)"/>
    <polygon points="0,-48 48,0 0,48 -48,0" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
    <polygon points="0,-36 36,0 0,36 -36,0" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>
    <rect x="-24" y="-28" width="10" height="22" rx="2" fill="#fff" opacity="0.85"/>
    <rect x="-10" y="-38" width="10" height="32" rx="2" fill="#fff" opacity="0.85"/>
    <rect x="4" y="-18" width="10" height="12" rx="2" fill="#fff" opacity="0.85"/>
    <rect x="18" y="-34" width="10" height="28" rx="2" fill="#fff" opacity="0.85"/>
    <line x1="-28" y1="-6" x2="32" y2="-6" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  </g>
  <!-- Side bars -->
  <g transform="translate(62,145)">
    <rect x="0" y="-18" width="12" height="18" rx="2" fill="url(#lgV)" opacity="0.3"/>
    <rect x="14" y="-28" width="12" height="28" rx="2" fill="url(#lgV)" opacity="0.45"/>
    <rect x="28" y="-10" width="12" height="10" rx="2" fill="url(#lgV)" opacity="0.2"/>
  </g>
  <g transform="translate(126,145)">
    <rect x="0" y="-24" width="10" height="24" rx="2" fill="url(#lgV)" opacity="0.25"/>
    <rect x="12" y="-14" width="10" height="14" rx="2" fill="url(#lgV)" opacity="0.4"/>
  </g>
  <!-- KPI badges -->
  <g transform="translate(66,48)">
    <rect x="-18" y="-10" width="36" height="14" rx="7" fill="rgba(245,166,35,0.08)" stroke="rgba(245,166,35,0.06)" stroke-width="0.5"/>
    <text x="0" y="1" text-anchor="middle" fill="#f5a623" font-size="7" font-weight="700" font-family="'Segoe UI',sans-serif">98%</text>
  </g>
  <g transform="translate(134,52)">
    <rect x="-18" y="-10" width="36" height="14" rx="7" fill="rgba(233,69,96,0.08)" stroke="rgba(233,69,96,0.06)" stroke-width="0.5"/>
    <text x="0" y="1" text-anchor="middle" fill="#e94560" font-size="7" font-weight="700" font-family="'Segoe UI',sans-serif">+12%</text>
  </g>
  <circle cx="28" cy="28" r="1.5" fill="#e94560" opacity="0.35"/>
  <circle cx="172" cy="28" r="1.5" fill="#f5a623" opacity="0.25"/>
  <circle cx="28" cy="172" r="1.5" fill="#f06a80" opacity="0.25"/>
  <circle cx="172" cy="172" r="1.5" fill="#f5a623" opacity="0.35"/>
</svg>
